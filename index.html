
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校招身价测评</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@700&family=Poppins:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #fefdfc;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", "Segoe UI", Roboto, "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: #0e0805;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      input, textarea, select, option {
        -webkit-user-select: text !important;
        user-select: text !important;
        pointer-events: auto !important;
        -webkit-appearance: none;
        appearance: none;
        color: #0e0805;
      }

      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }

      .resume-input-scroll::-webkit-scrollbar {
        width: 4px;
        background: transparent;
      }
      .resume-input-scroll::-webkit-scrollbar-thumb {
        background: rgba(10, 102, 194, 0.2);
        border-radius: 2px;
      }
      
      .glass-effect {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .gradient-text {
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        background-image: linear-gradient(to right, #065758, #0d9488);
      }

      .card-premium-shadow {
        box-shadow: 0 10px 40px -10px rgba(6, 87, 88, 0.08);
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }

      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      .animate-slide-up {
        animation: slideUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }

      .animate-scale-in {
        animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      .animate-float {
        animation: float 3s ease-in-out infinite;
      }

      /* === 新版 WelcomeView 动画 === */
      @keyframes slideUpCustom {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .animate-slide-up-custom {
        animation: slideUpCustom 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes shimmer-slide {
        0% { transform: translateX(-150%) skewX(-20deg); }
        20% { transform: translateX(250%) skewX(-20deg); }
        100% { transform: translateX(250%) skewX(-20deg); }
      }

      @keyframes shimmer {
        0% { left: -100%; }
        100% { left: 200%; }
      }
      .animate-shimmer {
        animation: shimmer 2.5s ease-in-out infinite;
      }

      @keyframes breathe-scale {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }

      /* 4 行文字循环滚动动画 */
      @keyframes vertical-scroll-5 {
        0%, 20% { transform: translateY(0); }
        25%, 45% { transform: translateY(-25%); }
        50%, 70% { transform: translateY(-50%); }
        75%, 95% { transform: translateY(-75%); }
        100% { transform: translateY(0); }
      }

      .animate-text-scroll {
        display: flex;
        flex-direction: column;
        animation: vertical-scroll-5 15s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }

      .btn-cta-shimmer {
        position: relative;
        overflow: hidden;
      }

      .btn-cta-shimmer::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        animation: shimmer-slide 3s infinite;
      }

      .animate-cta-breathe {
        animation: breathe-scale 2s ease-in-out infinite;
      }

      .animate-float-soft {
        animation: float 4s ease-in-out infinite;
      }

      .animate-scroll-proof {
        animation: scroll-proof 30s linear infinite;
      }

      @keyframes scroll-proof {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }

      .animate-loading-scroll {
        animation: loading-scroll 32s ease-in-out infinite;
      }

      @keyframes loading-scroll {
        0%, 16% { transform: translateY(0); }
        18%, 34% { transform: translateY(-25%); }
        36%, 52% { transform: translateY(-50%); }
        54%, 98% { transform: translateY(-75%); }
        100% { transform: translateY(0); }
      }

      .animate-bounce-soft {
        animation: bounce-soft 2s ease-in-out infinite;
      }

      @keyframes bounce-soft {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }

      .gradient-primary {
        background-color: #0A66C2;
      }

      .placeholder-light::placeholder {
        color: rgba(17, 14, 12, 0.2);
      }

      /* === 结果页动画 === */

      /* levelTag 淡入上移：delay 9.6s, duration 1.2s, easeOut */
      .anim-delay-fade {
        opacity: 0;
        animation: delayFadeInUp 1.2s ease-out forwards;
      }

      @keyframes delayFadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* levelDesc 淡入缩放：delay 10.8s, duration 1.5s, easeInOut */
      .anim-delay-scale {
        opacity: 0;
        animation: delayScaleIn 1.5s ease-in-out forwards;
      }

      @keyframes delayScaleIn {
        from { opacity: 0; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1); }
      }

      /* 圆环卡片从下滑入：delay 11.8s, duration 1.2s */
      .ring-card {
        opacity: 0;
        animation: ringSlideIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes ringSlideIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* 圆环进度动画：delay 12.5s, duration 2.0s, easeOut */
      .ring-progress {
        animation: circleProgress 2.0s ease-out forwards;
        stroke-dashoffset: var(--ring-circumference);
      }

      @keyframes circleProgress {
        from { stroke-dashoffset: var(--ring-circumference); }
        to { stroke-dashoffset: var(--ring-target-offset); }
      }

      /* 百分比数字弹出：delay 14.5s, duration 0.8s, backOut */
      .ring-center-num {
        opacity: 0;
        animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.5); }
        70% { opacity: 1; transform: scale(1.08); }
        100% { opacity: 1; transform: scale(1); }
      }

      /* 圆环下方文案淡入：delay 15.2s, duration 0.8s */
      .ring-desc {
        opacity: 0;
        animation: descFadeIn 0.8s ease-out forwards;
      }

      @keyframes descFadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "html2canvas": "https://esm.sh/html2canvas@1.4.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
