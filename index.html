
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校招竞争力评估</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@700&family=Poppins:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #fefdfc;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", "Segoe UI", Roboto, "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: #0e0805;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      input, textarea, select, option {
        -webkit-user-select: text !important;
        user-select: text !important;
        pointer-events: auto !important;
        -webkit-appearance: none;
        appearance: none;
        color: #0e0805;
      }

      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }

      .resume-input-scroll::-webkit-scrollbar {
        width: 4px;
        background: transparent;
      }
      .resume-input-scroll::-webkit-scrollbar-thumb {
        background: rgba(10, 102, 194, 0.2);
        border-radius: 2px;
      }
      
      .glass-effect {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .gradient-text {
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        background-image: linear-gradient(to right, #065758, #0d9488);
      }

      .card-premium-shadow {
        box-shadow: 0 10px 40px -10px rgba(6, 87, 88, 0.08);
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }

      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      .animate-slide-up {
        animation: slideUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }

      .animate-scale-in {
        animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      .animate-float {
        animation: float 3s ease-in-out infinite;
      }

      /* === 新版 WelcomeView 动画 === */
      @keyframes slideUpCustom {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .animate-slide-up-custom {
        animation: slideUpCustom 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes shimmer-slide {
        0% { transform: translateX(-150%) skewX(-20deg); }
        20% { transform: translateX(250%) skewX(-20deg); }
        100% { transform: translateX(250%) skewX(-20deg); }
      }

      @keyframes shimmer {
        0% { left: -100%; }
        100% { left: 200%; }
      }
      .animate-shimmer {
        animation: shimmer 2.5s ease-in-out infinite;
      }

      @keyframes breathe-scale {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }

      /* 4 行文字循环滚动动画 */
      @keyframes vertical-scroll-5 {
        0%, 20% { transform: translateY(0); }
        25%, 45% { transform: translateY(-25%); }
        50%, 70% { transform: translateY(-50%); }
        75%, 95% { transform: translateY(-75%); }
        100% { transform: translateY(0); }
      }

      .animate-text-scroll {
        display: flex;
        flex-direction: column;
        animation: vertical-scroll-5 15s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }

      .btn-cta-shimmer {
        position: relative;
        overflow: hidden;
      }

      .btn-cta-shimmer::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        animation: shimmer-slide 3s infinite;
      }

      .animate-cta-breathe {
        animation: breathe-scale 2s ease-in-out infinite;
      }

      .animate-float-soft {
        animation: float 4s ease-in-out infinite;
      }

      .animate-scroll-proof {
        animation: scroll-proof 30s linear infinite;
      }

      @keyframes scroll-proof {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }

      .animate-loading-scroll {
        animation: loading-scroll 32s ease-in-out infinite;
      }

      @keyframes loading-scroll {
        0%, 16% { transform: translateY(0); }
        18%, 34% { transform: translateY(-25%); }
        36%, 52% { transform: translateY(-50%); }
        54%, 98% { transform: translateY(-75%); }
        100% { transform: translateY(0); }
      }

      .animate-bounce-soft {
        animation: bounce-soft 2s ease-in-out infinite;
      }

      @keyframes bounce-soft {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }

      .gradient-primary {
        background-color: #0A66C2;
      }

      .placeholder-light::placeholder {
        color: rgba(17, 14, 12, 0.2);
      }

      /* 打印/导出 PDF 样式 */
      @media print {
        /* 隐藏不需要打印的元素 */
        header, .no-print, [data-no-print] { display: none !important; }
        /* 报告区域铺满 */
        body { background: white !important; }
        .print-area {
          overflow: visible !important;
          height: auto !important;
          padding: 0 !important;
        }
        .print-area > * {
          break-inside: avoid;
        }
        /* 去掉圆角阴影，节省墨水 */
        .print-area div {
          box-shadow: none !important;
        }
      }

    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
